name: Deploy

# Default Cloud Run auto-deploy via Workload Identity Federation.
# SA: ait-agency-deploy@intelligent-group-ait.iam.gserviceaccount.com
# Bootstrapped: 2026-05-12 via bootstrap-wif.sh (manual fallback — workflow scope)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # Never cancel an in-flight deploy

jobs:
  portability-lint:
    name: Portability lint (multi-machine paths + secret patterns)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Run pre-commit portable-paths hook in --check mode
        run: |
          if [ -f scripts/git-hooks/pre-commit-portable-paths.sh ]; then
            bash scripts/git-hooks/pre-commit-portable-paths.sh --check
          else
            echo "scripts/git-hooks/pre-commit-portable-paths.sh not present in repo — skipping."
          fi

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Submit Cloud Build (async)
        id: build
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          BUILD_ID=$(gcloud builds submit . \
            --project="${{ secrets.GCP_PROJECT }}" \
            --config=cloudbuild-api.yaml \
            --substitutions="SHORT_SHA=${SHORT_SHA}" \
            --async \
            --format='value(id)')
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "Submitted build: $BUILD_ID (SHORT_SHA=${SHORT_SHA})"

      - name: Wait for build to finish
        run: |
          BUILD_ID="${{ steps.build.outputs.build_id }}"
          for i in $(seq 1 120); do
            STATUS=$(gcloud builds describe "$BUILD_ID" \
              --project="${{ secrets.GCP_PROJECT }}" \
              --region=global \
              --format='value(status)')
            echo "[$i] build $BUILD_ID -> $STATUS"
            case "$STATUS" in
              SUCCESS) exit 0 ;;
              FAILURE|TIMEOUT|CANCELLED|EXPIRED|INTERNAL_ERROR)
                echo "Build ended with status $STATUS"
                exit 1 ;;
            esac
            sleep 15
          done
          echo "Build did not finish in 30 minutes."
          exit 1

      - name: Deploy to Cloud Run
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          gcloud run deploy "$REPO_NAME" \
            --project="${{ secrets.GCP_PROJECT }}" \
            --region=us-central1 \
            --image="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/containers/${REPO_NAME}:latest"

      - name: Verify deployment
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          SERVICE_URL=$(gcloud run services describe "$REPO_NAME" \
            --project="${{ secrets.GCP_PROJECT }}" \
            --region=us-central1 \
            --format="value(status.url)")
          echo "Service URL: ${SERVICE_URL}"
          curl --fail --silent --max-time 30 "${SERVICE_URL}/api/v1/health" \
            && echo "Health check passed" \
            || echo "Health check skipped (no /api/v1/health)"
